<svg xmlns="http://www.w3.org/2000/svg" width="804" height="730" viewBox="0 0 804 730" role="img" aria-labelledby="title desc">
  <title id="title">Scene 3: Socket Creation and the Accept Queue</title>
  <desc id="desc">An autoplaying, looping explanation of request_sock expansion and movement into the accept queue.</desc>
  <defs>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="170%"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0f172a" flood-opacity=".12"/></filter><clipPath id="clip"><rect x="2" y="2" width="800" height="600" rx="10"/></clipPath>
    <style>
      text{font-family:"Trebuchet MS",sans-serif;fill:#1e293b}.mono{font-family:"Courier New",monospace}.label{font-size:17px;font-weight:700;letter-spacing:2px}.title{font-size:17px;font-weight:700}.small{font-size:12px}.tiny{font-size:10px}.path{fill:none;stroke-width:4;stroke-dasharray:1000;stroke-dashoffset:1000}.head{opacity:0}.info-step{font:700 13px "Courier New",monospace;fill:#059669}.info{font-size:17px;font-weight:600}
      #ack{animation:ack 20s infinite}#ackpath{animation:ackpath 20s infinite}#ackhead{animation:ackhead 20s infinite}#gear{transform-box:fill-box;transform-origin:center;animation:gear 20s infinite}#gear-ring{animation:gearring 20s infinite}#socket-details{animation:details 20s infinite}#fdpath{animation:fdpath 20s infinite}#fdhead{animation:fdhead 20s infinite}#fd-return{animation:fdreturn 20s infinite}#app-card{animation:appcard 20s infinite}.i1{animation:i1 20s infinite}.i2{animation:i2 20s infinite}.i3{animation:i3 20s infinite}.i4{animation:i4 20s infinite}.i5{animation:i5 20s infinite}.i6{animation:i6 20s infinite}
      @keyframes ack{0%,4%{opacity:0}5%,16%{opacity:1}18%,100%{opacity:0}}@keyframes ackpath{0%,9%{stroke-dashoffset:1000}17%,96%{stroke-dashoffset:0}100%{stroke-dashoffset:1000}}@keyframes ackhead{0%,15%{opacity:0}17%,96%{opacity:1}100%{opacity:0}}@keyframes gear{0%,31%{transform:rotate(0)}50%{transform:rotate(720deg)}51%,100%{transform:rotate(0)}}@keyframes gearring{0%,31%{stroke:#64748b;filter:none}33%,49%{stroke:#8b5cf6;filter:url(#shadow)}51%,100%{stroke:#64748b;filter:none}}@keyframes details{0%,36%{opacity:0}39%,96%{opacity:1}100%{opacity:0}}@keyframes fdpath{0%,72%{stroke-dashoffset:1000}80%,96%{stroke-dashoffset:0}100%{stroke-dashoffset:1000}}@keyframes fdhead{0%,77%{opacity:0}79%,96%{opacity:1}100%{opacity:0}}@keyframes fdreturn{0%,79%{opacity:0;transform:translateY(20px)}81%,96%{opacity:1;transform:translateY(0)}100%{opacity:0}}@keyframes appcard{0%,64%{fill:#fff;stroke:#3b82f6}66%,96%{fill:#dcfce7;stroke:#10b981}100%{fill:#fff;stroke:#3b82f6}}
      @keyframes i1{0%,3%{opacity:0}4%,16%{opacity:1}18%,100%{opacity:0}}@keyframes i2{0%,16%{opacity:0}18%,31%{opacity:1}33%,100%{opacity:0}}@keyframes i3{0%,31%{opacity:0}33%,49%{opacity:1}51%,100%{opacity:0}}@keyframes i4{0%,49%{opacity:0}51%,64%{opacity:1}66%,100%{opacity:0}}@keyframes i5{0%,64%{opacity:0}66%,79%{opacity:1}81%,100%{opacity:0}}@keyframes i6{0%,79%{opacity:0}81%,96%{opacity:1}100%{opacity:0}}
    </style>
  </defs>
  <rect x="1" y="1" width="802" height="602" rx="12" fill="#fff" stroke="#cbd5e1" stroke-width="2"/><g clip-path="url(#clip)">
    <rect x="2" y="2" width="800" height="160" fill="#eff6ff" fill-opacity=".55"/><rect x="2" y="162" width="800" height="340" fill="#f0fdf4" fill-opacity=".55"/><rect x="2" y="502" width="800" height="100" fill="#fef2f2" fill-opacity=".7"/><path d="M2 162H802" stroke="#94a3b8" stroke-width="3" stroke-dasharray="9 7"/><path d="M2 502H802" stroke="#10b981" stroke-width="3" stroke-dasharray="9 7"/>
    <text x="22" y="34" class="label" fill="#3b82f6">USER_MODE</text><text x="22" y="194" class="label" fill="#10b981">KERNEL_MODE</text><text x="22" y="543" class="label" fill="#f43f5e">HARDWARE</text>
    <g filter="url(#shadow)"><rect id="app-card" x="302" y="42" width="240" height="100" rx="8" fill="#fff" stroke="#3b82f6" stroke-width="2"/><rect x="411" y="60" width="22" height="18" rx="2" fill="none" stroke="#3b82f6" stroke-width="2"/><path d="m416 65 4 4-4 4m6 0h6" fill="none" stroke="#3b82f6" stroke-width="2"/><text x="422" y="105" text-anchor="middle" class="title">Your Server App</text><text x="422" y="126" text-anchor="middle" class="small" fill="#2563eb"><tspan class="sleeping">accept() waiting / wakes up</tspan></text></g>
    <rect x="342" y="182" width="180" height="28" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/><text x="432" y="201" text-anchor="middle" class="mono small" fill="#64748b">Listen Socket is FD = 3</text>
    <g><rect x="22" y="222" width="220" height="180" rx="8" fill="#fef3c7" fill-opacity=".35" stroke="#f59e0b" stroke-width="2" stroke-dasharray="7 6"/><rect x="38" y="210" width="102" height="25" rx="5" fill="#fef3c7" stroke="#f59e0b"/><text x="89" y="227" text-anchor="middle" font-size="14" font-weight="700" fill="#b45309">SYN Queue</text></g>
    <g><rect x="552" y="222" width="230" height="180" rx="8" fill="#d1fae5" fill-opacity=".35" stroke="#10b981" stroke-width="2" stroke-dasharray="7 6"/><rect x="568" y="210" width="190" height="25" rx="5" fill="#d1fae5" stroke="#10b981"/><text x="663" y="227" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">Accept Queue (Backlog)</text></g>
    <g filter="url(#shadow)"><rect x="32" y="522" width="160" height="60" rx="8" fill="#fff" stroke="#f43f5e" stroke-width="2"/><path d="M100 539h24v15h-24zm4 15v5m16-5v5" fill="none" stroke="#f43f5e" stroke-width="2"/><text x="112" y="572" text-anchor="middle" font-size="14" font-weight="700">NIC</text></g>
    <g id="gear"><circle id="gear-ring" cx="402" cy="262" r="40" fill="#f1f5f9" stroke="#64748b" stroke-width="3"/><path d="M402 239v8m0 30v8m-23-23h8m30 0h8m-39-16 6 6m20 20 6 6m0-32-6 6m-20 20-6 6" stroke="#8b5cf6" stroke-width="5"/><circle cx="402" cy="262" r="10" fill="none" stroke="#64748b" stroke-width="4"/></g><text x="402" y="332" text-anchor="middle" class="mono small" font-weight="700" fill="#64748b">sk_clone_lock()</text>
    <g id="ack"><rect x="192" y="527" width="70" height="50" rx="6" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="2"/><text x="227" y="558" text-anchor="middle" class="mono small" font-weight="700" fill="#0369a1">[ACK]</text></g>
    <path id="ackpath" class="path" stroke="#0ea5e9" d="M227 527V402"/><polygon id="ackhead" class="head" points="227,402 217,417 237,417" fill="#0ea5e9"/>
    <g id="socket"><animateTransform attributeName="transform" type="translate" dur="20s" repeatCount="indefinite" values="0 0;0 0;270 70;270 70;530 0;530 0;0 0" keyTimes="0;.22;.3;.51;.58;.96;1"/><rect x="42" y="272" width="140" height="50" rx="6" fill="#fdf4ff" stroke="#d946ef" stroke-width="2"><animate attributeName="width" dur="20s" repeatCount="indefinite" values="140;140;190;190;140" keyTimes="0;.36;.39;.96;1"/><animate attributeName="height" dur="20s" repeatCount="indefinite" values="50;50;100;100;50" keyTimes="0;.36;.39;.96;1"/><animate attributeName="fill" dur="20s" repeatCount="indefinite" values="#fdf4ff;#fdf4ff;#fff1f2;#fff1f2;#fdf4ff" keyTimes="0;.36;.39;.96;1"/><animate attributeName="stroke" dur="20s" repeatCount="indefinite" values="#d946ef;#d946ef;#f43f5e;#f43f5e;#d946ef" keyTimes="0;.36;.39;.96;1"/></rect><text x="112" y="302" text-anchor="middle" class="mono small" font-weight="700" fill="#a21caf">request_sock</text><g id="socket-details"><path d="M50 312h170" stroke="#fda4af"/><text x="52" y="330" class="tiny" fill="#64748b">STATE: <tspan font-weight="700" fill="#be123c">ESTABLISHED</tspan></text><text x="52" y="346" class="tiny" font-weight="700" fill="#059669">4-Tuple Bound</text><text x="52" y="362" class="tiny" font-weight="700" fill="#6366f1">+ sk_receive_queue</text></g></g>
    <path id="fdpath" class="path" stroke="#10b981" stroke-dasharray="8 8" d="M662 222Q662 122 542 82"/><polygon id="fdhead" class="head" points="542,82 557,72 557,92" fill="#10b981"/><g id="fd-return"><rect x="482" y="112" width="174" height="34" rx="17" fill="#10b981"/><text x="569" y="134" text-anchor="middle" class="mono" font-size="14" font-weight="700" fill="#fff">Returns FD = 4</text></g>
  </g>
  <g filter="url(#shadow)"><rect x="1" y="620" width="802" height="108" rx="8" fill="#fff" stroke="#e2e8f0"/><rect x="1" y="620" width="6" height="108" rx="3" fill="#10b981"/>
    <g class="i1"><text x="28" y="648" class="info-step">STEP 1:</text><text x="28" y="679" class="info">The client sends the final ACK. The 3-way handshake completes.</text></g><g class="i2"><text x="28" y="648" class="info-step">STEP 2:</text><text x="28" y="679" class="info">The Kernel removes the mini request_sock from the SYN Queue.</text></g><g class="i3"><text x="28" y="648" class="info-step">STEP 3:</text><text x="28" y="675" class="info"><tspan x="28">sk_clone_lock() expands the mini-struct into the full, established</tspan><tspan x="28" dy="22">socket structure.</tspan></text></g><g class="i4"><text x="28" y="648" class="info-step">STEP 4:</text><text x="28" y="679" class="info">The established socket moves into the Accept Queue (Backlog).</text></g><g class="i5"><text x="28" y="648" class="info-step">STEP 5:</text><text x="28" y="675" class="info"><tspan x="28">The application's sleeping accept() wakes up and pulls the socket</tspan><tspan x="28" dy="22">from the queue.</tspan></text></g><g class="i6"><text x="28" y="648" class="info-step">STEP 6:</text><text x="28" y="675" class="info"><tspan x="28">The Kernel assigns file descriptor 4 and returns it to the</tspan><tspan x="28" dy="22">application.</tspan></text></g>
  </g>
</svg>
