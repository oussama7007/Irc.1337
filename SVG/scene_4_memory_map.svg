<svg xmlns="http://www.w3.org/2000/svg" width="804" height="730" viewBox="0 0 804 730" role="img" aria-labelledby="title desc">
  <title id="title">Scene 4: Kernel Memory Map from PID to struct sock</title><desc id="desc">An autoplaying, looping explanation of how the kernel resolves an application and file descriptor to a socket.</desc>
  <defs><filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0f172a" flood-opacity=".12"/></filter><clipPath id="clip"><rect x="2" y="2" width="800" height="600" rx="10"/></clipPath><style>
    text{font-family:"Trebuchet MS",sans-serif;fill:#1e293b}.mono{font-family:"Courier New",monospace}.label{font-size:17px;font-weight:700;letter-spacing:2px}.title{font-size:14px;font-weight:700}.cell{font:12px "Courier New",monospace}.tiny{font-size:10px}.path{fill:none;stroke-width:3;stroke-dasharray:1000;stroke-dashoffset:1000}.head{opacity:0}.info-step{font:700 13px "Courier New",monospace;fill:#7c3aed}.info{font-size:17px;font-weight:600}
    #syscall{animation:syscall 18s infinite}#p1{animation:p1 18s infinite}#h1{animation:h1 18s infinite}#pidrow{animation:pidrow 18s infinite}#p2{animation:p2 18s infinite}#h2{animation:h2 18s infinite}#task{animation:task 18s infinite}#filesrow{animation:filesrow 18s infinite}#p3{animation:p3 18s infinite}#h3{animation:h3 18s infinite}#fdrow{animation:fdrow 18s infinite}#p4{animation:p4 18s infinite}#h4{animation:h4 18s infinite}#sock{animation:sock 18s infinite}.i1{animation:i1 18s infinite}.i2{animation:i2 18s infinite}.i3{animation:i3 18s infinite}.i4{animation:i4 18s infinite}.i5{animation:i5 18s infinite}.i6{animation:i6 18s infinite}
    @keyframes syscall{0%,3%{opacity:0}5%,96%{opacity:1}100%{opacity:0}}@keyframes p1{0%,7%{stroke-dashoffset:1000}13%,96%{stroke-dashoffset:0}100%{stroke-dashoffset:1000}}@keyframes h1{0%,11%{opacity:0}13%,96%{opacity:1}100%{opacity:0}}@keyframes pidrow{0%,14%{fill:#fff}16%,96%{fill:#ffe4e6}100%{fill:#fff}}@keyframes p2{0%,24%{stroke-dashoffset:1000}30%,96%{stroke-dashoffset:0}100%{stroke-dashoffset:1000}}@keyframes h2{0%,28%{opacity:0}30%,96%{opacity:1}100%{opacity:0}}@keyframes task{0%,31%{fill:#fff}33%,96%{fill:#faf5ff}100%{fill:#fff}}@keyframes filesrow{0%,43%{fill:#fff}45%,96%{fill:#f3e8ff}100%{fill:#fff}}@keyframes p3{0%,49%{stroke-dashoffset:1000}55%,96%{stroke-dashoffset:0}100%{stroke-dashoffset:1000}}@keyframes h3{0%,53%{opacity:0}55%,96%{opacity:1}100%{opacity:0}}@keyframes fdrow{0%,57%{fill:#fff}59%,96%{fill:#fef3c7}100%{fill:#fff}}@keyframes p4{0%,68%{stroke-dashoffset:1000}74%,96%{stroke-dashoffset:0}100%{stroke-dashoffset:1000}}@keyframes h4{0%,72%{opacity:0}74%,96%{opacity:1}100%{opacity:0}}@keyframes sock{0%,76%{fill:#f0fdf4;filter:none}78%,96%{fill:#dcfce7;filter:url(#shadow)}100%{fill:#f0fdf4;filter:none}}
    @keyframes i1{0%,2%{opacity:0}3%,14%{opacity:1}16%,100%{opacity:0}}@keyframes i2{0%,14%{opacity:0}16%,31%{opacity:1}33%,100%{opacity:0}}@keyframes i3{0%,31%{opacity:0}33%,43%{opacity:1}45%,100%{opacity:0}}@keyframes i4{0%,43%{opacity:0}45%,57%{opacity:1}59%,100%{opacity:0}}@keyframes i5{0%,57%{opacity:0}59%,76%{opacity:1}78%,100%{opacity:0}}@keyframes i6{0%,76%{opacity:0}78%,96%{opacity:1}100%{opacity:0}}
  </style></defs>
  <rect x="1" y="1" width="802" height="602" rx="12" fill="#fff" stroke="#cbd5e1" stroke-width="2"/><g clip-path="url(#clip)"><rect x="2" y="2" width="800" height="120" fill="#eff6ff" fill-opacity=".55"/><rect x="2" y="122" width="800" height="480" fill="#f0fdf4" fill-opacity=".55"/><path d="M2 122H802" stroke="#94a3b8" stroke-width="3" stroke-dasharray="9 7"/><text x="782" y="34" text-anchor="end" class="label" fill="#3b82f6">USER_MODE</text><text x="782" y="154" text-anchor="end" class="label" fill="#10b981">KERNEL_MODE</text>
    <g filter="url(#shadow)"><rect x="52" y="22" width="200" height="90" rx="8" fill="#fff" stroke="#3b82f6" stroke-width="2"/><rect x="141" y="38" width="22" height="18" rx="2" fill="none" stroke="#3b82f6" stroke-width="2"/><path d="m146 43 4 4-4 4m6 0h6" fill="none" stroke="#3b82f6" stroke-width="2"/><text x="152" y="82" text-anchor="middle" font-size="17" font-weight="700">Your App</text><text x="152" y="101" text-anchor="middle" class="cell" fill="#2563eb">PID: 77234</text></g><g id="syscall"><rect x="162" y="126" width="118" height="28" rx="4" fill="#3b82f6"/><text x="221" y="145" text-anchor="middle" class="cell" font-weight="700" fill="#fff">read(fd = 4)</text></g>
    <g filter="url(#shadow)"><rect x="32" y="182" width="220" height="144" rx="8" fill="#fff" stroke="#f43f5e" stroke-width="2"/><rect x="33" y="183" width="218" height="38" rx="7" fill="#fff1f2"/><text x="142" y="207" text-anchor="middle" class="title" fill="#9f1239">PID Hash Table</text><path d="M142 221v104M33 255h218M33 290h218" stroke="#e2e8f0"/><text x="45" y="244" class="cell">192</text><text x="154" y="244" class="tiny" fill="#94a3b8">0xFFFF_111</text><rect id="pidrow" x="33" y="255" width="218" height="35" fill="#fff"/><text x="45" y="278" class="cell" font-weight="700" fill="#e11d48">77234</text><text x="154" y="278" class="tiny" font-weight="700">0xFFFF_AAAA</text><text x="45" y="313" class="cell">2314</text><text x="154" y="313" class="tiny" fill="#94a3b8">0xFFFF_BBB</text></g>
    <g filter="url(#shadow)"><rect id="task" x="302" y="182" width="220" height="144" rx="8" fill="#fff" stroke="#8b5cf6" stroke-width="2"/><rect x="303" y="183" width="218" height="38" rx="7" fill="#faf5ff"/><text x="315" y="207" class="title" fill="#6b21a8">task_struct</text><text x="510" y="207" text-anchor="end" class="tiny" fill="#a855f7">0xFFFF_AAAA</text><path d="M303 255h218M303 290h218" stroke="#e2e8f0"/><text x="315" y="244" class="cell">*cred</text><text x="510" y="244" text-anchor="end" class="cell" fill="#94a3b8">-&gt; 0x...</text><text x="315" y="278" class="cell">*mm</text><text x="510" y="278" text-anchor="end" class="cell" fill="#94a3b8">-&gt; 0x...</text><rect id="filesrow" x="303" y="290" width="218" height="35" fill="#fff"/><text x="315" y="313" class="cell" font-weight="700" fill="#7e22ce">*files</text><text x="510" y="313" text-anchor="end" class="cell" font-weight="700">-&gt; FD Table</text></g>
    <g filter="url(#shadow)"><rect x="552" y="182" width="220" height="178" rx="8" fill="#fff" stroke="#f59e0b" stroke-width="2"/><rect x="553" y="183" width="218" height="38" rx="7" fill="#fffbeb"/><text x="662" y="207" text-anchor="middle" class="title" fill="#92400e">files_struct (FDs)</text><path d="M662 221v138M553 255h218M553 290h218M553 325h218" stroke="#e2e8f0"/><text x="565" y="244" class="cell">0 (STDIN)</text><text x="674" y="244" class="tiny" fill="#94a3b8">0x...</text><text x="565" y="278" class="cell">1 (STDOUT)</text><text x="674" y="278" class="tiny" fill="#94a3b8">0x...</text><text x="565" y="313" class="cell">3 (Listen)</text><text x="674" y="313" class="tiny" fill="#94a3b8">0xSRV_...</text><rect id="fdrow" x="553" y="325" width="218" height="34" fill="#fff"/><text x="565" y="347" class="cell" font-weight="700" fill="#d97706">4 (Socket)</text><text x="674" y="347" class="tiny" font-weight="700">0xSTC_213</text></g>
    <g filter="url(#shadow)"><rect id="sock" x="552" y="382" width="220" height="150" rx="8" fill="#f0fdf4" stroke="#10b981" stroke-width="2"/><text x="566" y="409" font-size="15" font-weight="700" fill="#065f46">struct sock</text><text x="758" y="409" text-anchor="end" class="tiny" fill="#059669">0xSTC_213</text><path d="M565 419h194" stroke="#a7f3d0"/><text x="565" y="441" class="cell" fill="#475569">Family:</text><text x="758" y="441" text-anchor="end" class="cell" font-weight="700">AF_INET (IPv4)</text><text x="565" y="461" class="cell" fill="#475569">Type:</text><text x="758" y="461" text-anchor="end" class="cell" font-weight="700">SOCK_STREAM</text><text x="565" y="481" class="cell" fill="#475569">State:</text><text x="758" y="481" text-anchor="end" class="cell" font-weight="700" fill="#059669">ESTABLISHED</text><rect x="564" y="495" width="196" height="25" rx="4" fill="#fff" stroke="#a7f3d0"/><text x="662" y="512" text-anchor="middle" class="tiny" font-weight="700" fill="#047857">[Data Buffer / sk_receive_queue]</text></g>
    <path id="p1" class="path" stroke="#f43f5e" d="M142 112v70"/><polygon id="h1" class="head" points="142,182 137,172 147,172" fill="#f43f5e"/><path id="p2" class="path" stroke="#8b5cf6" d="M252 242h50"/><polygon id="h2" class="head" points="302,242 292,237 292,247" fill="#8b5cf6"/><path id="p3" class="path" stroke="#f59e0b" d="M522 282h30"/><polygon id="h3" class="head" points="552,282 542,277 542,287" fill="#f59e0b"/><path id="p4" class="path" stroke="#10b981" d="M662 360v22"/><polygon id="h4" class="head" points="662,382 657,372 667,372" fill="#10b981"/>
  </g>
  <g filter="url(#shadow)"><rect x="1" y="620" width="802" height="108" rx="8" fill="#fff" stroke="#e2e8f0"/><rect x="1" y="620" width="6" height="108" rx="3" fill="#8b5cf6"/><g class="i1"><text x="28" y="648" class="info-step">STEP 1:</text><text x="28" y="679" class="info">Your App executes the syscall read(fd=4).</text></g><g class="i2"><text x="28" y="648" class="info-step">STEP 2:</text><text x="28" y="675" class="info"><tspan x="28">The Kernel intercepts it and looks up PID 77234 in the PID</tspan><tspan x="28" dy="22">Hash Table.</tspan></text></g><g class="i3"><text x="28" y="648" class="info-step">STEP 3:</text><text x="28" y="679" class="info">The result points to the program's task_struct in memory.</text></g><g class="i4"><text x="28" y="648" class="info-step">STEP 4:</text><text x="28" y="679" class="info">The Kernel follows *files to the File Descriptor Table.</text></g><g class="i5"><text x="28" y="648" class="info-step">STEP 5:</text><text x="28" y="675" class="info"><tspan x="28">Index 4 holds the memory address 0xSTC_213 for the connected</tspan><tspan x="28" dy="22">socket.</tspan></text></g><g class="i6"><text x="28" y="648" class="info-step">STEP 6:</text><text x="28" y="675" class="info"><tspan x="28">Target acquired. The Kernel accesses struct sock and its incoming</tspan><tspan x="28" dy="22">data buffer.</tspan></text></g></g>
</svg>
