<svg xmlns="http://www.w3.org/2000/svg" width="804" height="730" viewBox="0 0 804 730" role="img" aria-labelledby="title desc">
  <title id="title">Scene 6: poll, Wait Queues, and Wakeup Callbacks</title><desc id="desc">An autoplaying, looping explanation of an application sleeping in poll and being woken when data arrives.</desc>
  <defs><filter id="shadow" x="-25%" y="-25%" width="150%" height="170%"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0f172a" flood-opacity=".12"/></filter><clipPath id="clip"><rect x="2" y="2" width="800" height="600" rx="10"/></clipPath><style>
    text{font-family:"Trebuchet MS",sans-serif;fill:#1e293b}.mono{font-family:"Courier New",monospace}.label{font-size:17px;font-weight:700;letter-spacing:2px}.title{font-size:16px;font-weight:700}.small{font-size:12px}.tiny{font-size:10px}.path{fill:none;stroke-width:3;stroke-dasharray:1000;stroke-dashoffset:1000}.head{opacity:0}.info-step{font:700 13px "Courier New",monospace;fill:#d97706}.info{font-size:17px;font-weight:600}
    #pid{animation:pid 18s infinite}#app{animation:app 18s infinite}#packet{animation:packet 18s infinite}#trigger{animation:trigger 18s infinite}#triggerhead{animation:th 18s infinite}#alarm{animation:alarm 18s infinite}#check{animation:check 18s infinite}#checkhead{animation:ch 18s infinite}#wake{animation:wake 18s infinite}#wakehead{animation:wh 18s infinite}#pollin{animation:pollin 18s infinite}.i1{animation:i1 18s infinite}.i2{animation:i2 18s infinite}.i3{animation:i3 18s infinite}.i4{animation:i4 18s infinite}.i5{animation:i5 18s infinite}
    @keyframes pid{0%,7%{opacity:0;transform:translate(0,0)}9%,13%{opacity:1;transform:translate(0,0)}16%,72%{opacity:1;transform:translate(160px,230px)}74%,100%{opacity:0}}@keyframes app{0%,13%{fill:#fff;stroke:#3b82f6}15%,70%{fill:#f1f5f9;stroke:#94a3b8}73%,96%{fill:#dcfce7;stroke:#10b981}100%{fill:#fff;stroke:#3b82f6}}@keyframes packet{0%,20%{transform:translate(0,0)}22%,96%{transform:translate(430px,-55px)}100%{transform:translate(0,0)}}@keyframes trigger{0%,35%{stroke-dashoffset:1000}41%,96%{stroke-dashoffset:0}100%{stroke-dashoffset:1000}}@keyframes th{0%,39%{opacity:0}41%,96%{opacity:1}100%{opacity:0}}@keyframes alarm{0%,40%{fill:#fff;filter:none;transform:scale(1)}42%,96%{fill:#fef3c7;filter:url(#shadow);transform:scale(1.05)}100%{fill:#fff;filter:none;transform:scale(1)}}@keyframes check{0%,51%{stroke-dashoffset:1000}58%,96%{stroke-dashoffset:0}100%{stroke-dashoffset:1000}}@keyframes ch{0%,56%{opacity:0}58%,96%{opacity:1}100%{opacity:0}}@keyframes wake{0%,65%{stroke-dashoffset:1000}72%,96%{stroke-dashoffset:0}100%{stroke-dashoffset:1000}}@keyframes wh{0%,70%{opacity:0}72%,96%{opacity:1}100%{opacity:0}}@keyframes pollin{0%,74%{opacity:0;transform:translateY(20px)}77%,96%{opacity:1;transform:translateY(-140px)}100%{opacity:0}}@keyframes i1{0%,2%{opacity:0}3%,20%{opacity:1}22%,100%{opacity:0}}@keyframes i2{0%,20%{opacity:0}22%,35%{opacity:1}37%,100%{opacity:0}}@keyframes i3{0%,35%{opacity:0}37%,51%{opacity:1}53%,100%{opacity:0}}@keyframes i4{0%,51%{opacity:0}53%,65%{opacity:1}67%,100%{opacity:0}}@keyframes i5{0%,65%{opacity:0}67%,96%{opacity:1}100%{opacity:0}}
  </style></defs>
  <rect x="1" y="1" width="802" height="602" rx="12" fill="#fff" stroke="#cbd5e1" stroke-width="2"/><g clip-path="url(#clip)"><rect x="2" y="2" width="800" height="160" fill="#eff6ff" fill-opacity=".55"/><rect x="2" y="162" width="800" height="440" fill="#f0fdf4" fill-opacity=".55"/><path d="M2 162H802" stroke="#94a3b8" stroke-width="3" stroke-dasharray="9 7"/><text x="782" y="34" text-anchor="end" class="label" fill="#3b82f6">USER_MODE</text><text x="782" y="194" text-anchor="end" class="label" fill="#10b981">KERNEL_MODE</text>
    <g filter="url(#shadow)"><rect id="app" x="302" y="32" width="220" height="110" rx="8" fill="#fff" stroke="#3b82f6" stroke-width="2"/><rect x="401" y="50" width="22" height="18" rx="2" fill="none" stroke="#3b82f6" stroke-width="2"/><path d="m406 55 4 4-4 4m6 0h6" fill="none" stroke="#3b82f6" stroke-width="2"/><text x="412" y="94" text-anchor="middle" class="title">Your App</text><text x="412" y="120" text-anchor="middle" class="mono small" fill="#2563eb">poll(fd=4) / sleeping / awake</text></g>
    <g filter="url(#shadow)"><rect x="152" y="222" width="520" height="320" rx="8" fill="#f0fdf4" stroke="#10b981" stroke-width="2"/><text x="174" y="252" font-size="18" font-weight="700" fill="#065f46">struct sock</text><path d="M174 263H650" stroke="#a7f3d0"/>
      <rect x="442" y="282" width="200" height="120" rx="8" fill="#f3e8ff" fill-opacity=".6" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="7 6"/><text x="542" y="309" text-anchor="middle" font-size="14" font-weight="700" fill="#7e22ce">sk_wq (Wait Q)</text><text x="542" y="334" text-anchor="middle" class="tiny" fill="#a855f7"><tspan x="542">Processes sleeping</tspan><tspan x="542" dy="16">on this socket</tspan></text>
      <rect id="alarm" x="192" y="302" width="180" height="80" rx="8" fill="#fff" stroke="#f59e0b" stroke-width="2"/><path d="M274 329c0-10 16-10 16 0v9l5 6h-26l5-6z" fill="none" stroke="#f59e0b" stroke-width="2"/><circle cx="282" cy="348" r="2" fill="#f59e0b"/><text x="282" y="369" text-anchor="middle" class="mono small" font-weight="700">sk_data_ready()</text>
      <rect x="182" y="432" width="460" height="80" rx="8" fill="#e0f2fe" fill-opacity=".55" stroke="#0ea5e9" stroke-width="2" stroke-dasharray="7 6"/><text x="198" y="454" font-size="14" font-weight="700" fill="#0369a1">sk_receive_queue</text>
    </g>
    <g id="pid"><rect x="352" y="82" width="100" height="30" rx="4" fill="#e2e8f0" stroke="#94a3b8"/><text x="402" y="102" text-anchor="middle" class="mono small" font-weight="700" fill="#475569">PID: 77234</text></g>
    <g id="packet"><rect x="-98" y="522" width="90" height="50" rx="6" fill="#bae6fd" stroke="#0284c7" stroke-width="2"/><text x="-53" y="544" text-anchor="middle" class="mono small" font-weight="700" fill="#0369a1">[DATA]</text><text x="-53" y="560" text-anchor="middle" class="tiny" fill="#0369a1">Hello!</text></g>
    <path id="trigger" class="path" stroke="#f59e0b" stroke-dasharray="6 6" d="M232 462V382"/><polygon id="triggerhead" class="head" points="232,382 227,392 237,392" fill="#f59e0b"/><path id="check" class="path" stroke="#8b5cf6" d="M372 342H442"/><polygon id="checkhead" class="head" points="442,342 432,337 432,347" fill="#8b5cf6"/><path id="wake" class="path" stroke="#10b981" d="M552 282Q552 142 432 142"/><polygon id="wakehead" class="head" points="432,142 447,137 447,147" fill="#10b981"/>
    <g id="pollin"><rect x="352" y="152" width="120" height="32" rx="16" fill="#10b981"/><text x="412" y="173" text-anchor="middle" class="mono" font-size="14" font-weight="700" fill="#fff">POLLIN</text></g>
  </g><g filter="url(#shadow)"><rect x="1" y="620" width="802" height="108" rx="8" fill="#fff" stroke="#e2e8f0"/><rect x="1" y="620" width="6" height="108" rx="3" fill="#f59e0b"/><g class="i1"><text x="28" y="648" class="info-step">STEP 1:</text><text x="28" y="675" class="info"><tspan x="28">Your App calls poll(). No data is ready, so its PID enters sk_wq</tspan><tspan x="28" dy="22">and the process sleeps.</tspan></text></g><g class="i2"><text x="28" y="648" class="info-step">STEP 2:</text><text x="28" y="675" class="info"><tspan x="28">New network data arrives and is placed into the socket's</tspan><tspan x="28" dy="22">sk_receive_queue.</tspan></text></g><g class="i3"><text x="28" y="648" class="info-step">STEP 3:</text><text x="28" y="675" class="info"><tspan x="28">The arrival of data triggers the sk_data_ready callback, like</tspan><tspan x="28" dy="22">an alarm.</tspan></text></g><g class="i4"><text x="28" y="648" class="info-step">STEP 4:</text><text x="28" y="675" class="info"><tspan x="28">sk_data_ready() checks sk_wq to find processes waiting for</tspan><tspan x="28" dy="22">this socket.</tspan></text></g><g class="i5"><text x="28" y="648" class="info-step">STEP 5:</text><text x="28" y="675" class="info"><tspan x="28">It finds your App's PID, wakes the process, and poll() returns</tspan><tspan x="28" dy="22">the POLLIN readiness event.</tspan></text></g></g>
</svg>
