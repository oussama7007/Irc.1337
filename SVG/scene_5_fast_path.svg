<svg xmlns="http://www.w3.org/2000/svg" width="804" height="730" viewBox="0 0 804 730" role="img" aria-labelledby="title desc">
  <title id="title">Scene 5: TCP Established Fast Path</title><desc id="desc">An autoplaying, looping explanation of an established TCP packet using the ehash fast path.</desc>
  <defs><filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0f172a" flood-opacity=".12"/></filter><clipPath id="clip"><rect x="2" y="2" width="800" height="600" rx="10"/></clipPath><style>
    text{font-family:"Trebuchet MS",sans-serif;fill:#1e293b}.mono{font-family:"Courier New",monospace}.label{font-size:17px;font-weight:700;letter-spacing:2px}.title{font-size:14px;font-weight:700}.cell{font:12px "Courier New",monospace}.tiny{font-size:10px}.path{fill:none;stroke-width:3;stroke-dasharray:1000;stroke-dashoffset:1000}.head{opacity:0}.info-step{font:700 13px "Courier New",monospace;fill:#2563eb}.info{font-size:17px;font-weight:600}
    #packet{animation:packet 15s infinite}#p1{animation:p1 15s infinite}#h1{animation:h1 15s infinite}#hash{animation:hash 15s infinite}#p2{animation:p2 15s infinite}#h2{animation:h2 15s infinite}#ehashrow{animation:row 15s infinite}#p3{animation:p3 15s infinite}#h3{animation:h3 15s infinite}.i1{animation:i1 15s infinite}.i2{animation:i2 15s infinite}.i3{animation:i3 15s infinite}.i4{animation:i4 15s infinite}
    @keyframes packet{0%,7%{opacity:0;transform:translate(0,0)}9%,21%{opacity:1;transform:translate(0,0)}29%,70%{opacity:1;transform:translate(-50px,-135px)}78%,96%{opacity:1;transform:translate(410px,-270px)}100%{opacity:0;transform:translate(0,0)}}@keyframes p1{0%,12%{stroke-dashoffset:1000}20%,96%{stroke-dashoffset:0}100%{stroke-dashoffset:1000}}@keyframes h1{0%,18%{opacity:0}20%,96%{opacity:1}100%{opacity:0}}@keyframes hash{0%,28%{opacity:0;transform:scale(.8)}31%,96%{opacity:1;transform:scale(1)}100%{opacity:0}}@keyframes p2{0%,39%{stroke-dashoffset:1000}47%,96%{stroke-dashoffset:0}100%{stroke-dashoffset:1000}}@keyframes h2{0%,45%{opacity:0}47%,96%{opacity:1}100%{opacity:0}}@keyframes row{0%,49%{fill:#fff}51%,96%{fill:#dbeafe}100%{fill:#fff}}@keyframes p3{0%,62%{stroke-dashoffset:1000}70%,96%{stroke-dashoffset:0}100%{stroke-dashoffset:1000}}@keyframes h3{0%,68%{opacity:0}70%,96%{opacity:1}100%{opacity:0}}@keyframes i1{0%,2%{opacity:0}3%,22%{opacity:1}24%,100%{opacity:0}}@keyframes i2{0%,22%{opacity:0}24%,49%{opacity:1}51%,100%{opacity:0}}@keyframes i3{0%,49%{opacity:0}51%,73%{opacity:1}75%,100%{opacity:0}}@keyframes i4{0%,73%{opacity:0}75%,96%{opacity:1}100%{opacity:0}}
  </style></defs>
  <rect x="1" y="1" width="802" height="602" rx="12" fill="#fff" stroke="#cbd5e1" stroke-width="2"/><g clip-path="url(#clip)"><rect x="2" y="2" width="800" height="480" fill="#f0fdf4" fill-opacity=".55"/><rect x="2" y="482" width="800" height="120" fill="#fef2f2" fill-opacity=".7"/><path d="M2 482H802" stroke="#10b981" stroke-width="3" stroke-dasharray="9 7"/><text x="782" y="34" text-anchor="end" class="label" fill="#10b981">KERNEL_MODE</text><text x="782" y="523" text-anchor="end" class="label" fill="#f43f5e">HARDWARE</text>
    <g filter="url(#shadow)"><rect x="52" y="512" width="160" height="70" rx="8" fill="#fff" stroke="#f43f5e" stroke-width="2"/><path d="M120 530h24v15h-24zm4 15v5m16-5v5" fill="none" stroke="#f43f5e" stroke-width="2"/><text x="132" y="570" text-anchor="middle" class="title">NIC</text></g><g filter="url(#shadow)"><rect x="52" y="382" width="160" height="80" rx="8" fill="#fff" stroke="#10b981" stroke-width="2"/><rect x="119" y="399" width="26" height="22" rx="3" fill="none" stroke="#10b981" stroke-width="2"/><path d="M125 394v5m8-5v5m-8 22v5m8-5v5m-19-20h5m-5 8h5m26-8h5m-5 8h5" stroke="#10b981" stroke-width="2"/><text x="132" y="449" text-anchor="middle" class="title">Network Stack</text></g>
    <g id="hash"><rect x="62" y="312" width="154" height="38" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 5"/><text x="139" y="336" text-anchor="middle" class="cell" font-weight="700" fill="#475569"># Hash(4-tuple)</text></g>
    <g filter="url(#shadow)"><rect x="242" y="152" width="260" height="178" rx="8" fill="#fff" stroke="#3b82f6" stroke-width="2"/><rect x="243" y="153" width="258" height="38" rx="7" fill="#eff6ff"/><text x="372" y="177" text-anchor="middle" class="title" fill="#1e40af"># TCP Established (ehash)</text><rect x="243" y="191" width="258" height="32" fill="#f8fafc"/><path d="M372 191v138M243 223h258M243 258h258M243 293h258" stroke="#e2e8f0"/><text x="255" y="212" class="tiny" font-weight="700" fill="#64748b">Hash Key</text><text x="384" y="212" class="tiny" font-weight="700" fill="#64748b">Socket Ptr</text><text x="255" y="246" class="cell">0x1A2B...</text><text x="384" y="246" class="tiny" fill="#94a3b8">0xFFFF_111</text><rect id="ehashrow" x="243" y="258" width="258" height="35" fill="#fff"/><text x="255" y="280" class="cell" font-weight="700" fill="#2563eb">0x9F8D...</text><text x="384" y="280" class="tiny" font-weight="700">0xSTC_213</text><text x="255" y="316" class="cell">0x4C5D...</text><text x="384" y="316" class="tiny" fill="#94a3b8">0xFFFF_BBB</text></g>
    <g filter="url(#shadow)"><rect x="552" y="182" width="220" height="170" rx="8" fill="#f0fdf4" stroke="#10b981" stroke-width="2"/><text x="566" y="209" font-size="15" font-weight="700" fill="#065f46">struct sock</text><text x="758" y="209" text-anchor="end" class="tiny" fill="#059669">0xSTC_213</text><path d="M565 219h194" stroke="#a7f3d0"/><text x="565" y="243" class="cell" fill="#475569">State:</text><text x="758" y="243" text-anchor="end" class="cell" font-weight="700" fill="#059669">ESTABLISHED</text><rect x="565" y="258" width="194" height="78" rx="6" fill="#fff" stroke="#10b981" stroke-width="2" stroke-dasharray="6 5"/><text x="575" y="275" class="tiny" font-weight="700" fill="#059669">sk_receive_queue</text></g>
    <g id="packet"><rect x="212" y="517" width="80" height="50" rx="6" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="2"/><text x="252" y="539" text-anchor="middle" class="tiny" font-weight="700" fill="#0369a1">[PSH, ACK]</text><text x="252" y="555" text-anchor="middle" class="tiny" font-weight="700" fill="#0369a1">DATA</text></g>
    <path id="p1" class="path" stroke="#f43f5e" d="M132 512v-50"/><polygon id="h1" class="head" points="132,462 127,472 137,472" fill="#f43f5e"/><path id="p2" class="path" stroke="#3b82f6" d="M192 312Q232 262 232 222"/><polygon id="h2" class="head" points="232,222 227,232 237,232" fill="#3b82f6"/><path id="p3" class="path" stroke="#10b981" d="M502 222h40"/><polygon id="h3" class="head" points="542,222 532,217 532,227" fill="#10b981"/>
  </g><g filter="url(#shadow)"><rect x="1" y="620" width="802" height="108" rx="8" fill="#fff" stroke="#e2e8f0"/><rect x="1" y="620" width="6" height="108" rx="3" fill="#3b82f6"/><g class="i1"><text x="28" y="648" class="info-step">STEP 1:</text><text x="28" y="679" class="info">An existing client sends a data packet [PSH, ACK].</text></g><g class="i2"><text x="28" y="648" class="info-step">STEP 2:</text><text x="28" y="675" class="info"><tspan x="28">The Kernel parses it and hashes the connection's source and</tspan><tspan x="28" dy="22">destination IP addresses and ports.</tspan></text></g><g class="i3"><text x="28" y="648" class="info-step">STEP 3:</text><text x="28" y="675" class="info"><tspan x="28">The Kernel performs an ultra-fast O(1) lookup in the TCP</tspan><tspan x="28" dy="22">Established Hash Table (ehash).</tspan></text></g><g class="i4"><text x="28" y="648" class="info-step">STEP 4:</text><text x="28" y="675" class="info"><tspan x="28">Match found. The packet bypasses connection queues and lands</tspan><tspan x="28" dy="22">directly in sk_receive_queue.</tspan></text></g></g>
</svg>
