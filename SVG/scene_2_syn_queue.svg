<svg xmlns="http://www.w3.org/2000/svg" width="804" height="730" viewBox="0 0 804 730" role="img" aria-labelledby="title desc">
  <title id="title">Scene 2: Network Interrupt and SYN Queue</title>
  <desc id="desc">An autoplaying, looping explanation of a SYN packet moving from the NIC into the kernel SYN queue.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0f172a" flood-opacity=".12"/></filter>
    <clipPath id="clip"><rect x="2" y="2" width="800" height="600" rx="10"/></clipPath>
    <style>
      text{font-family:"Trebuchet MS",sans-serif;fill:#1e293b}.mono{font-family:"Courier New",monospace}.label{font-size:17px;font-weight:700;letter-spacing:2px}.title{font-size:16px;font-weight:700}.small{font-size:12px}.tiny{font-size:10px}.cell{font:13px "Courier New",monospace}.path{fill:none;stroke-width:4;stroke-dasharray:1000;stroke-dashoffset:1000}.head{opacity:0}.info-step{font:700 13px "Courier New",monospace;fill:#d97706}.info{font-size:17px;font-weight:600}
      #packet{animation:packet 19s infinite}#interrupt{animation:interrupt 19s infinite}#interrupt-head{animation:ih 19s infinite}#lookup{animation:lookup 19s infinite}#lookup-head{animation:lh 19s infinite}#target-row{animation:row 19s infinite}#mini{transform-box:fill-box;transform-origin:center;animation:mini 19s infinite}.i1{animation:i1 19s infinite}.i2{animation:i2 19s infinite}.i3{animation:i3 19s infinite}.i4{animation:i4 19s infinite}.i5{animation:i5 19s infinite}.i6{animation:i6 19s infinite}
      @keyframes packet{0%,7%{opacity:0;transform:translate(0,0)}9%,25%{opacity:1;transform:translate(0,0)}31%,96%{opacity:1;transform:translate(-100px,-245px)}100%{opacity:0;transform:translate(0,0)}}@keyframes interrupt{0%,18%{stroke-dashoffset:1000}27%,96%{stroke-dashoffset:0}100%{stroke-dashoffset:1000}}@keyframes ih{0%,25%{opacity:0}27%,96%{opacity:1}100%{opacity:0}}@keyframes lookup{0%,39%{stroke-dashoffset:1000}48%,96%{stroke-dashoffset:0}100%{stroke-dashoffset:1000}}@keyframes lh{0%,46%{opacity:0}48%,96%{opacity:1}100%{opacity:0}}@keyframes row{0%,49%{fill:#fff}51%,96%{fill:#dbeafe}100%{fill:#fff}}@keyframes mini{0%,61%{opacity:0;transform:translate(0,0) scale(.8)}64%,77%{opacity:1;transform:translate(0,0) scale(1)}86%,96%{opacity:1;transform:translate(300px,230px) scale(1)}100%{opacity:0;transform:translate(0,0) scale(.8)}}
      @keyframes i1{0%,3%{opacity:0}5%,17%{opacity:1}19%,100%{opacity:0}}@keyframes i2{0%,17%{opacity:0}19%,38%{opacity:1}40%,100%{opacity:0}}@keyframes i3{0%,38%{opacity:0}40%,49%{opacity:1}51%,100%{opacity:0}}@keyframes i4{0%,49%{opacity:0}51%,62%{opacity:1}64%,100%{opacity:0}}@keyframes i5{0%,62%{opacity:0}64%,77%{opacity:1}79%,100%{opacity:0}}@keyframes i6{0%,77%{opacity:0}79%,96%{opacity:1}100%{opacity:0}}
    </style>
  </defs>
  <rect x="1" y="1" width="802" height="602" rx="12" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
  <g clip-path="url(#clip)">
    <rect x="2" y="2" width="800" height="480" fill="#f0fdf4" fill-opacity=".55"/><rect x="2" y="482" width="800" height="120" fill="#fef2f2" fill-opacity=".7"/><path d="M2 482H802" stroke="#10b981" stroke-width="3" stroke-dasharray="9 7"/>
    <text x="22" y="34" class="label" fill="#10b981">KERNEL_MODE</text><text x="22" y="523" class="label" fill="#f43f5e">HARDWARE</text>
    <g filter="url(#shadow)"><rect x="52" y="502" width="180" height="80" rx="8" fill="#fff" stroke="#f43f5e" stroke-width="2"/><path d="M132 522h20v15h-20zm4 15v5m12-5v5m-19-14h-5m33 0h5" fill="none" stroke="#f43f5e" stroke-width="2"/><text x="142" y="563" text-anchor="middle" class="title">NIC</text></g>
    <g filter="url(#shadow)"><rect x="52" y="252" width="180" height="100" rx="8" fill="#fff" stroke="#10b981" stroke-width="2"/><rect x="129" y="273" width="26" height="22" rx="3" fill="none" stroke="#10b981" stroke-width="2"/><path d="M135 268v5m8-5v5m-8 22v5m8-5v5m-19-20h5m-5 8h5m26-8h5m-5 8h5" stroke="#10b981" stroke-width="2"/><text x="142" y="325" text-anchor="middle" class="title">SoftIRQ (Kernel)</text></g>
    <g filter="url(#shadow)"><rect x="302" y="42" width="450" height="178" rx="8" fill="#fff" stroke="#3b82f6" stroke-width="2"/><rect x="303" y="43" width="448" height="38" rx="7" fill="#eff6ff"/><text x="324" y="67" class="title" fill="#1e40af">#  TCP Bind Hash Table (bhash)</text><rect x="303" y="81" width="448" height="34" fill="#f1f5f9"/><path d="M527 81v138M303 115h448M303 149h448M303 183h448" stroke="#e2e8f0"/><text x="315" y="103" class="cell" font-weight="700">Port (Key)</text><text x="539" y="103" class="cell" font-weight="700">Socket Pointer (Value)</text><text x="315" y="137" class="cell">443</text><text x="539" y="137" class="cell" fill="#64748b">0xFFFF_1234_8880</text><rect id="target-row" x="303" y="149" width="448" height="34" fill="#fff"/><text x="315" y="171" class="cell" font-weight="700" fill="#2563eb">8080</text><text x="539" y="171" class="cell" font-weight="700" fill="#9333ea">0xSTC_213_SOC</text><text x="315" y="205" class="cell">...</text><text x="539" y="205" class="cell">...</text></g>
    <g><rect x="452" y="282" width="300" height="140" rx="8" fill="#fef3c7" fill-opacity=".35" stroke="#f59e0b" stroke-width="2" stroke-dasharray="7 6"/><rect x="470" y="270" width="244" height="25" rx="5" fill="#fef3c7" stroke="#f59e0b"/><text x="592" y="287" text-anchor="middle" class="title" font-size="14" fill="#b45309">Incompleted Queue (SYN Queue)</text><text x="602" y="337" text-anchor="middle" class="small" fill="#d97706"><tspan x="602">Temporary mini-structs wait here</tspan><tspan x="602" dy="17">for the final ACK.</tspan><tspan x="602" dy="17">DDoS protection.</tspan></text></g>
    <g id="packet"><rect x="232" y="507" width="80" height="60" rx="6" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="2"/><text x="272" y="532" text-anchor="middle" class="cell" font-weight="700" fill="#0369a1">[SYN]</text><text x="272" y="550" text-anchor="middle" class="tiny" fill="#0369a1">DST: 8080</text></g>
    <g id="mini"><rect x="232" y="102" width="140" height="50" rx="6" fill="#fdf4ff" stroke="#d946ef" stroke-width="2"/><path d="M246 119h14v14h-14zm3-4h14v14" fill="none" stroke="#d946ef"/><text x="307" y="132" text-anchor="middle" class="cell" font-weight="700" fill="#a21caf">request_sock</text></g>
    <path id="interrupt" class="path" stroke="#f43f5e" d="M142 502V352"/><polygon id="interrupt-head" class="head" points="142,352 132,367 152,367" fill="#f43f5e"/><path id="lookup" class="path" stroke="#3b82f6" d="M142 252Q142 142 302 142"/><polygon id="lookup-head" class="head" points="302,142 287,132 287,152" fill="#3b82f6"/>
  </g>
  <g filter="url(#shadow)"><rect x="1" y="620" width="802" height="108" rx="8" fill="#fff" stroke="#e2e8f0"/><rect x="1" y="620" width="6" height="108" rx="3" fill="#f59e0b"/>
    <g class="i1"><text x="28" y="648" class="info-step">STEP 1:</text><text x="28" y="679" class="info">A new client wants to connect. The NIC receives a SYN packet.</text></g>
    <g class="i2"><text x="28" y="648" class="info-step">STEP 2:</text><text x="28" y="675" class="info"><tspan x="28">The NIC sends a hardware interrupt to the Kernel to process</tspan><tspan x="28" dy="22">the incoming packet.</tspan></text></g>
    <g class="i3"><text x="28" y="648" class="info-step">STEP 3:</text><text x="28" y="675" class="info"><tspan x="28">The Kernel reads destination port 8080 and checks the TCP Bind</tspan><tspan x="28" dy="22">Hash Table.</tspan></text></g>
    <g class="i4"><text x="28" y="648" class="info-step">STEP 4:</text><text x="28" y="679" class="info">Match found. Port 8080 points to the server's listening socket.</text></g>
    <g class="i5"><text x="28" y="648" class="info-step">STEP 5:</text><text x="28" y="675" class="info"><tspan x="28">The handshake is incomplete, so the Kernel creates a small</tspan><tspan x="28" dy="22">request_sock structure.</tspan></text></g>
    <g class="i6"><text x="28" y="648" class="info-step">STEP 6:</text><text x="28" y="675" class="info"><tspan x="28">The mini-struct enters the SYN Queue and waits for the client's</tspan><tspan x="28" dy="22">final ACK.</tspan></text></g>
  </g>
</svg>
